version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=hive_user
      - POSTGRES_PASSWORD=hive_password
      - POSTGRES_DB=hivedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive_user -d hivedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "7777:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://hive_user:hive_password@db:5432/hivedb
      - APPLE_SHARED_SECRET=63e3a31c98b147b89344d8caba4b321f
      - REDIS_URL=redis://redis:6379/0
      - PROJECT_NAME=Hive-Production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "8085:80"
    depends_on:
      - backend

volumes:
  postgres_data:
