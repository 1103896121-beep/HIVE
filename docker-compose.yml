version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=hive_user
      - POSTGRES_PASSWORD=hive_password
      - POSTGRES_DB=hivedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive_user -d hivedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://hive_user:hive_password@db:5432/hivedb
      - PROJECT_NAME=Hive-Local-Test
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
