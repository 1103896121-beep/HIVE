version: '3.8'

services:
  HIVE_backend:
    build: .
    container_name: HIVE_backend
    ports:
      - "${BACKEND_PORT:-7777}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@HIVE_db:5432/hivedb
      - REDIS_URL=redis://HIVE_redis:6379/0
    depends_on:
      - HIVE_db
      - HIVE_redis

  HIVE_redis:
    image: redis:7-alpine
    container_name: HIVE_redis
    restart: always

  HIVE_db:
    image: postgres:15
    container_name: HIVE_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=hivedb
    volumes:
      - HIVE_postgres_data:/var/lib/postgresql/data
    # 彻底杜绝端口冲突：测试数据库不再映射到共有宿主机
    # ports:
    #   - "${DB_PORT:-5432}:5432"

volumes:
  HIVE_postgres_data:
