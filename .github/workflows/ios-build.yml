name: Build & Export iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install Dependencies
      run: |
        cd frontend
        npm install --legacy-peer-deps
        
    - name: Build Web
      run: |
        cd frontend
        npm run build
        
    - name: Capacitor Sync
      run: |
        cd frontend
        npx cap sync ios
        
    - name: Install CocoaPods
      run: |
        cd frontend/ios/App
        pod install
        
    - name: Import Code Signing Certificates
      uses: apple-actions/import-codesign-certs@v3
      with:
        # 使用你截图中的 Secret 名称
        p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
        p12-password: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}

    - name: Install Provisioning Profile
      run: |
        mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
        echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/com.qingning.hive AppStore.mobileprovision"

    - name: Setup App Store Connect Auth Key
      run: |
        echo "${{ secrets.APPSTORE_API_PRIVATE_KEY }}" > ~/auth_key.p8

    - name: Build Archive
      run: |
        cd frontend/ios/App
        xcodebuild -workspace App.xcworkspace \
                   -scheme App \
                   -sdk iphoneos \
                   -configuration Release \
                   -archivePath $PWD/build/App.xcarchive \
                   archive
    
    - name: Export IPA
      run: |
        # 创建 ExportOptions.plist (手动模式)
        cat > ExportOptions.plist <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadBitcode</key>
            <true/>
            <key>compileBitcode</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>com.qingning.hive</key>
                <string>com.qingning.hive AppStore</string>
            </dict>
        </dict>
        </plist>
        EOF
        
        cd frontend/ios/App
        xcodebuild -exportArchive \
                   -archivePath $PWD/build/App.xcarchive \
                   -exportOptionsPlist $PWD/ExportOptions.plist \
                   -exportPath $PWD/build/Exported \
                   -allowProvisioningUpdates \
                   -authenticationKeyIssuerID "${{ secrets.APPSTORE_ISSUER_ID }}" \
                   -authenticationKeyID "${{ secrets.APPSTORE_KEY_ID }}" \
                   -authenticationKeyPath "$HOME/auth_key.p8"

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hive-production-ipa
        path: frontend/ios/App/build/Exported/*.ipa
