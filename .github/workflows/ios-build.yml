name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install Dependencies
      run: |
        cd frontend
        npm install
        
    - name: Build Web
      run: |
        cd frontend
        npm run build
        
    - name: Capacitor Sync
      run: |
        cd frontend
        npx cap sync ios
        
    - name: Build App (iOS)
      run: |
        cd frontend/ios/App
        # 注意：此处仅为编译检查。如需导出 IPA，需配置证书与 Provisioning Profile
        xcodebuild -scheme App -destination 'generic/platform=iOS' build CODE_SIGNING_ALLOWED=NO
        
    - name: Archive Production
      uses: actions/upload-artifact@v4
      with:
        name: hive-ios-build
        path: frontend/ios/App/build/Release-iphoneos/*.app
