name: Deploy Legal Pages to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/public/privacy.html'
      - 'frontend/public/privacy_en.html'
      - 'frontend/public/eula.html'
      - 'frontend/public/eula_en.html'
      - '.github/workflows/deploy-legal-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp frontend/public/privacy.html    _site/privacy.html
          cp frontend/public/privacy_en.html _site/privacy_en.html
          cp frontend/public/eula.html       _site/eula.html
          cp frontend/public/eula_en.html    _site/eula_en.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4