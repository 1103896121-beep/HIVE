name: Deploy Legal Pages to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      # 仅当法律文档变更时才触发部署，避免频繁无谓重构
      - 'frontend/public/privacy*.html'
      - 'frontend/public/eula*.html'
      - '.github/workflows/deploy-legal-pages.yml'

  # 允许手动触发
  workflow_dispatch:

# 授予写入 GitHub Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 防止并发部署相互干扰
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 将法律文档集中到一个临时目录，便于 Pages 展示
      - name: Prepare Legal Pages
        run: |
          mkdir -p _legal_site
          # 仅复制英文和简体中文两个版本
          cp frontend/public/privacy.html     _legal_site/privacy.html
          cp frontend/public/privacy_en.html  _legal_site/privacy_en.html
          cp frontend/public/eula.html        _legal_site/eula.html
          cp frontend/public/eula_en.html     _legal_site/eula_en.html

          # 生成首页导航，方便 Apple 审核人员快速定位
          cat > _legal_site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Hive - Legal Documents</title>
            <style>
              body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; color: #333; }
              h1 { font-size: 1.6rem; border-bottom: 2px solid #f5a623; padding-bottom: 12px; }
              .section { margin: 28px 0; }
              h2 { font-size: 1rem; color: #555; margin-bottom: 10px; }
              a { display: inline-block; margin: 4px 8px 4px 0; padding: 6px 14px; border-radius: 6px;
                  background: #f5a623; color: #000; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
              a:hover { opacity: 0.85; }
              footer { margin-top: 48px; color: #aaa; font-size: 0.8rem; }
            </style>
          </head>
          <body>
            <h1>🐝 Hive Legal Documents</h1>

            <div class="section">
              <h2>Privacy Policy / 隐私政策</h2>
              <a href="privacy.html">简体中文</a>
              <a href="privacy_en.html">English</a>
            </div>

            <div class="section">
              <h2>End User License Agreement / 用户许可协议</h2>
              <a href="eula.html">简体中文</a>
              <a href="eula_en.html">English</a>
            </div>

            <footer>
              <p>Hive &copy; 2026 · <a href="mailto:support@hiveapp.com" style="background:none;padding:0;font-weight:normal;font-size:inherit;color:#aaa;">support@hiveapp.com</a></p>
            </footer>
          </body>
          </html>
          EOF

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_legal_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
