name: Deploy Legal Pages to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      # д»…еҪ“жі•еҫӢж–ҮжЎЈеҸҳжӣҙж—¶жүҚи§ҰеҸ‘йғЁзҪІпјҢйҒҝе…Қйў‘з№Ғж— и°“йҮҚжһ?      - 'frontend/public/privacy*.html'
      - 'frontend/public/eula*.html'
      - '.github/workflows/deploy-legal-pages.yml'

  # е…Ғи®ёжүӢеҠЁи§ҰеҸ‘
  workflow_dispatch:

# жҺҲдәҲеҶҷе…Ҙ GitHub Pages зҡ„жқғйҷ?permissions:
  contents: read
  pages: write
  id-token: write

# йҳІжӯўе№¶еҸ‘йғЁзҪІзӣёдә’е№Іжү°
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # е°Ҷжі•еҫӢж–ҮжЎЈйӣҶдёӯеҲ°дёҖдёӘдёҙж—¶зӣ®еҪ•пјҢдҫҝдәҺ Pages еұ•зӨә
      - name: Prepare Legal Pages
        run: |
          mkdir -p _legal_site
          # д»…еӨҚеҲ¶иӢұж–Үе’Ңз®ҖдҪ“дёӯж–ҮдёӨдёӘзүҲжң?          cp frontend/public/privacy.html     _legal_site/privacy.html
          cp frontend/public/privacy_en.html  _legal_site/privacy_en.html
          cp frontend/public/eula.html        _legal_site/eula.html
          cp frontend/public/eula_en.html     _legal_site/eula_en.html

          # з”ҹжҲҗйҰ–йЎөеҜјиҲӘпјҢж–№дҫ?Apple е®Ўж ёдәәе‘ҳеҝ«йҖҹе®ҡдҪ?          cat > _legal_site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Hive - Legal Documents</title>
            <style>
              body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; color: #333; }
              h1 { font-size: 1.6rem; border-bottom: 2px solid #f5a623; padding-bottom: 12px; }
              .section { margin: 28px 0; }
              h2 { font-size: 1rem; color: #555; margin-bottom: 10px; }
              a { display: inline-block; margin: 4px 8px 4px 0; padding: 6px 14px; border-radius: 6px;
                  background: #f5a623; color: #000; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
              a:hover { opacity: 0.85; }
              footer { margin-top: 48px; color: #aaa; font-size: 0.8rem; }
            </style>
          </head>
          <body>
            <h1>рҹҗқ Hive Legal Documents</h1>

            <div class="section">
              <h2>Privacy Policy / йҡҗз§Ғж”ҝзӯ–</h2>
              <a href="privacy.html">з®ҖдҪ“дёӯж–?/a>
              <a href="privacy_en.html">English</a>
            </div>

            <div class="section">
              <h2>End User License Agreement / з”ЁжҲ·и®ёеҸҜеҚҸи®®</h2>
              <a href="eula.html">з®ҖдҪ“дёӯж–?/a>
              <a href="eula_en.html">English</a>
            </div>

            <footer>
              <p>Hive &copy; 2026 В· <a href="mailto:RobergeShaib214@gmail.com" style="background:none;padding:0;font-weight:normal;font-size:inherit;color:#aaa;">RobergeShaib214@gmail.com</a></p>
            </footer>
          </body>
          </html>
          EOF

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_legal_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
